name: Generate demo page

on:
  push:
    branches: [master, main]
    paths:
      - 'espibright/html.h'
      - 'scripts/generate_demo.py'
      - 'scripts/demo_head_inject.html'
      - 'scripts/demo_body_inject.html'
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit docs/index.html back

    steps:
      - uses: actions/checkout@v4

      - name: Generate docs/index.html
        run: python3 scripts/generate_demo.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet docs/index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated demo page
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: regenerate docs/index.html from html.h [skip ci]"
          git push
